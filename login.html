<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Iniciar Sesión - Mi Restaurante</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: #0a0a0a;
      position: relative;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    /* Blobs decorativos más armónicos y grandes como en la imagen */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 0;
      opacity: 0.12;
      pointer-events: none;
    }

    .blob-1 {
      width: 800px;
      height: 800px;
      background: var(--color-primary);
      top: -300px;
      left: -300px;
    }

    .blob-2 {
      width: 700px;
      height: 700px;
      background: var(--color-accent);
      bottom: -200px;
      right: -200px;
    }

    .blob-3 {
      width: 500px;
      height: 500px;
      background: var(--color-primary-dark);
      top: 30%;
      left: 60%;
    }

    .auth-container {
      position: relative;
      z-index: 1;
      max-width: 400px;
      width: 100%;
      text-align: center;
      background: rgba(255, 255, 255, 0.03); /* Bloque sutil */
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 40px 30px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .auth-logo {
      display: block;
      margin: 0 auto 15px auto;
      width: 70px;
      height: auto;
    }

    .auth-header h1 {
      font-family: var(--font-heading);
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 5px;
      color: #fff;
    }

    .auth-header p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.85rem;
      margin-bottom: 30px;
    }

    .form-group {
      display: block;
      width: 100%;
      margin-bottom: 12px;
    }

    .input-group {
      position: relative;
      width: 100%;
      display: block;
    }

    .input-group svg {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #fff;
      width: 18px;
      height: 18px;
      opacity: 0.6;
    }

    .input-group input {
      display: block;
      width: 100%;
      height: 50px;
      padding: 0 20px 0 50px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 0.9rem;
      transition: all 0.3s;
      box-sizing: border-box;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--color-accent);
      background: rgba(255, 255, 255, 0.08);
    }

    .forgot-password {
      display: block;
      text-align: center; /* Centrado */
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 10px;
      text-decoration: none;
      transition: color 0.3s;
    }

    .forgot-password:hover {
      color: var(--color-accent);
    }

    .btn-login {
      width: 100%;
      height: 54px;
      border-radius: 12px;
      background: var(--color-primary);
      border: none;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.3s;
    }

    .btn-login:hover {
      background: var(--color-primary-dark);
      transform: translateY(-1px);
      box-shadow: 0 6px 15px rgba(211, 47, 47, 0.3);
    }

    .btn-google {
      width: 100%;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #111;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      margin-top: 12px;
      transition: all 0.3s;
    }

    .btn-google:hover {
      background: #1a1a1a;
      border-color: rgba(255, 255, 255, 0.2);
    }

    .auth-error {
      color: #ff4d4d;
      font-size: 0.8rem;
      margin-top: 12px;
    }

    .auth-footer {
      margin-top: 25px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.85rem;
    }

    .auth-footer a {
      color: var(--color-accent);
      text-decoration: none;
      font-weight: 700;
    }

    .hidden { display: none; }

    /* Registro */
    #register-section .btn-login {
      background: var(--color-accent);
      color: #000;
    }
    #register-section .btn-login:hover {
      background: #e5ac00;
      box-shadow: 0 6px 15px rgba(255, 193, 7, 0.2);
    }

    .back-to-home {
      position: fixed;
      top: 30px;
      left: 30px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      opacity: 0.7;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      background: rgba(255, 255, 255, 0.05);
      padding: 10px 18px;
      border-radius: 100px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .back-to-home:hover {
      opacity: 1;
      background: rgba(255, 255, 255, 0.1);
      transform: translateX(-5px);
      border-color: rgba(255, 255, 255, 0.2);
    }

    @media (max-width: 768px) {
      .back-to-home {
        top: 20px;
        left: 20px;
        padding: 8px 14px;
        font-size: 0.8rem;
      }
    }
  </style>
</head>

<body>
  <!-- Botón Volver al Inicio -->
  <a href="index.html" class="back-to-home">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    Volver al Inicio
  </a>
  <!-- SITE PRELOADER -->
  <div id="site-preloader" class="site-preloader">
    <div class="preloader-content">
      <img src="images/logo.png" alt="Logo" class="preloader-logo">
      <div class="preloader-spinner"></div>
    </div>
  </div>

  <div class="auth-page">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="auth-container">
      <!-- LOGIN -->
      <div id="login-section">
        <img src="images/logo.png" alt="Logo" class="auth-logo">
        <div class="auth-header">
          <h1>Login</h1>
          <p>Ingresa tus credenciales para continuar</p>
        </div>

        <form class="auth-form" id="form-login">
          <div class="form-group">
            <div class="input-group">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
              <input type="email" id="login-email" required placeholder="Usuario o Email">
            </div>
          </div>
          
          <div class="form-group">
            <div class="input-group">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input type="password" id="login-password" required placeholder="Contraseña">
            </div>
            <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
          </div>

          <button type="submit" class="btn-login">Iniciar Sesión</button>
          
          <button type="button" class="btn-google" id="btn-google-login">
            <svg width="18" height="18" viewBox="0 0 24 24">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 7.22-4.53z" fill="#EA4335"/>
            </svg>
            Continuar con Google
          </button>

          <p id="login-error" class="auth-error"></p>
        </form>

        <div class="auth-footer">
          ¿No tienes cuenta? <a href="#" onclick="toggleAuth(event, 'register')">¡Regístrate!</a>
        </div>
      </div>

      <!-- REGISTER -->
      <div id="register-section" class="hidden">
        <img src="images/logo.png" alt="Logo" class="auth-logo">
        <div class="auth-header">
          <h1>Registro</h1>
          <p>Crea tu cuenta para continuar</p>
        </div>

        <form class="auth-form" id="form-register">
          <div class="form-group">
            <div class="input-group">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
              <input type="text" id="reg-name" required placeholder="Nombre completo">
            </div>
          </div>

          <div class="form-group">
            <div class="input-group">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
              </svg>
              <input type="email" id="reg-email" required placeholder="Correo electrónico">
            </div>
          </div>

          <div class="form-group">
            <div class="input-group">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input type="password" id="reg-password" required placeholder="Contraseña (mín. 6 caracteres)" minlength="6">
            </div>
          </div>

          <button type="submit" class="btn-login">Crear Cuenta</button>
          <p id="reg-error" class="auth-error"></p>
        </form>

        <div class="auth-footer">
          ¿Ya tienes cuenta? <a href="#" onclick="toggleAuth(event, 'login')">Inicia sesión aquí</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  
  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>

  <script>
    function toggleAuth(e, mode) {
      if(e) e.preventDefault();
      const loginSec = document.getElementById('login-section');
      const regSec = document.getElementById('register-section');
      
      if(mode === 'register') {
        loginSec.classList.add('hidden');
        regSec.classList.remove('hidden');
      } else {
        loginSec.classList.remove('hidden');
        regSec.classList.add('hidden');
      }
    }

    // Ocultar preloader fallback
    setTimeout(() => {
      const preloader = document.getElementById('site-preloader');
      if (preloader) preloader.classList.add('hidden');
    }, 1500);
  </script>
</body>

</html>
