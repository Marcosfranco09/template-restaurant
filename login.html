<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Iniciar Sesión - Mi Restaurante</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      background: radial-gradient(circle at top right, rgba(212, 175, 55, 0.05), transparent),
                  radial-gradient(circle at bottom left, rgba(212, 175, 55, 0.05), transparent);
    }

    .auth-container {
      max-width: 450px;
      width: 100%;
      background: var(--site-surface);
      border: 1px solid var(--site-border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 8px;
      color: var(--site-text);
    }

    .auth-header p {
      color: var(--site-text-muted);
      font-size: 0.95rem;
    }

    .auth-social {
      margin-bottom: 24px;
    }

    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: white;
      color: #1a1a1a;
      border: none;
      padding: 12px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
    }

    .btn-google:hover {
      background: #f5f5f5;
      transform: translateY(-2px);
    }

    .auth-divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 24px 0;
      color: var(--site-text-muted);
      font-size: 0.85rem;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--site-border);
    }

    .auth-divider:not(:empty)::before { margin-right: 12px; }
    .auth-divider:not(:empty)::after { margin-left: 12px; }

    .auth-form .form-group {
      margin-bottom: 20px;
    }

    .auth-form label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--site-text-muted);
    }

    .auth-form input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--site-border);
      border-radius: 12px;
      color: var(--site-text);
      font-family: 'Inter', sans-serif;
      transition: all 0.3s;
    }

    .auth-form input:focus {
      outline: none;
      border-color: var(--color-accent);
      background: rgba(255, 255, 255, 0.08);
    }

    .auth-error {
      color: #ff4d4d;
      font-size: 0.85rem;
      margin-top: 8px;
      text-align: center;
      display: none;
    }

    .auth-footer {
      margin-top: 32px;
      text-align: center;
      font-size: 0.9rem;
      color: var(--site-text-muted);
    }

    .auth-footer a {
      color: var(--color-accent);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    .hidden { display: none; }
  </style>
</head>

<body>
  <!-- SITE PRELOADER -->
  <div id="site-preloader" class="site-preloader">
    <div class="preloader-content">
      <img src="images/logo.png" alt="Logo" class="preloader-logo">
      <div class="preloader-spinner"></div>
    </div>
  </div>

  <div class="auth-page">
    <div class="auth-container">
      <!-- Tab Selector (Simple) -->
      <div id="login-section">
        <div class="auth-header">
          <h1>Bienvenido</h1>
          <p>Ingresá para gestionar tus pedidos</p>
        </div>

        <div class="auth-social">
          <button class="btn-google" id="btn-google-login">
            <svg width="20" height="20" viewBox="0 0 24 24">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"/>
            </svg>
            Continuar con Google
          </button>
        </div>

        <div class="auth-divider">o usá tu email</div>

        <form class="auth-form" id="form-login">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" required placeholder="tu@email.com">
          </div>
          <div class="form-group">
            <label for="login-password">Contraseña</label>
            <input type="password" id="login-password" required placeholder="••••••••">
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">Iniciar Sesión</button>
          <p id="login-error" class="auth-error"></p>
        </form>

        <div class="auth-footer">
          ¿No tenés cuenta? <a href="#" onclick="toggleAuth(event, 'register')">Registrate</a>
        </div>
      </div>

      <div id="register-section" class="hidden">
        <div class="auth-header">
          <h1>Crear Cuenta</h1>
          <p>Unite para disfrutar de beneficios exclusivos</p>
        </div>

        <form class="auth-form" id="form-register">
          <div class="form-group">
            <label for="reg-name">Nombre Completo</label>
            <input type="text" id="reg-name" required placeholder="Juan Pérez">
          </div>
          <div class="form-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" required placeholder="tu@email.com">
          </div>
          <div class="form-group">
            <label for="reg-password">Contraseña</label>
            <input type="password" id="reg-password" required placeholder="Mínimo 6 caracteres" minlength="6">
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">Registrarme</button>
          <p id="reg-error" class="auth-error"></p>
        </form>

        <div class="auth-footer">
          ¿Ya tenés cuenta? <a href="#" onclick="toggleAuth(event, 'login')">Iniciá Sesión</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  
  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>

  <script>
    function toggleAuth(e, mode) {
      if(e) e.preventDefault();
      const loginSec = document.getElementById('login-section');
      const regSec = document.getElementById('register-section');
      
      if(mode === 'register') {
        loginSec.classList.add('hidden');
        regSec.classList.remove('hidden');
      } else {
        loginSec.classList.remove('hidden');
        regSec.classList.add('hidden');
      }
    }

    // Ocultar preloader fallback
    setTimeout(() => {
      const preloader = document.getElementById('site-preloader');
      if (preloader) preloader.classList.add('hidden');
    }, 1500);
  </script>
</body>

</html>
