<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Mi Perfil - Mi Restaurante</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .profile-page {
      padding-top: 120px;
      padding-bottom: 80px;
      min-height: 100vh;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 40px;
      align-items: stretch;
    }

    @media (max-width: 991px) {
      .profile-grid {
        grid-template-columns: minmax(0, 1fr);
      }
    }

    .profile-sidebar {
      background: var(--site-surface);
      border: 1px solid var(--site-border);
      border-radius: 24px;
      padding: 30px;
      text-align: center;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--color-accent), var(--color-primary));
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 700;
      color: white;
      text-transform: uppercase;
    }

    .profile-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      margin-bottom: 8px;
    }

    .profile-email {
      color: var(--site-text-muted);
      font-size: 0.9rem;
      margin-bottom: 24px;
      word-break: break-all;
    }

    .profile-menu {
      border-top: 1px solid var(--site-border);
      padding-top: 20px;
      text-align: left;
    }

    .profile-menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      color: var(--site-text);
      text-decoration: none;
      border-radius: 12px;
      transition: all 0.3s;
      font-weight: 500;
    }

    .profile-menu-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .profile-menu-item.danger {
      color: #ff4d4d;
      margin-top: 20px;
    }

    .profile-main {
      background: var(--site-surface);
      border: 1px solid var(--site-border);
      border-radius: 24px;
      padding: 40px;
      display: flex;
      flex-direction: column;
      min-width: 0;
      width: 100%;
      box-sizing: border-box;
      overflow-x: hidden;
    }

    .profile-section {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .profile-section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .profile-form .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .form-field.full-width {
      grid-column: 1 / -1;
    }

    @media (max-width: 767px) {
      .profile-form .form-grid {
        grid-template-columns: 1fr;
        gap: 15px;
      }
      .profile-actions {
        justify-content: stretch !important;
      }
      .profile-actions button {
        width: 100%;
      }
    }

    .form-field {
      margin-bottom: 20px;
    }

    .form-field label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.85rem;
      color: var(--site-text-muted);
    }

    .form-field input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--site-border);
      border-radius: 12px;
      color: var(--site-text);
      font-family: 'Inter', sans-serif;
    }

    .form-field input:focus {
      outline: none;
      border-color: var(--color-accent);
    }

    .profile-actions {
      margin-top: 30px;
      display: flex;
      justify-content: flex-end;
    }

    #btn-save-profile {
      background: var(--color-accent);
      color: #1a1a1a;
      border: none;
      padding: 14px 30px;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      border-radius: 50px;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
      transition: all 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    #btn-save-profile:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(212, 175, 55, 0.5);
      background: #e6c14d;
    }

    .success-msg {
      position: fixed;
      top: 30px;
      right: 30px;
      background: rgba(10, 25, 18, 0.95);
      border: 1px solid rgba(0, 255, 136, 0.35);
      color: #00ff88;
      padding: 14px 24px;
      border-radius: 14px;
      font-weight: 600;
      font-size: 0.9rem;
      z-index: 9999;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 255, 136, 0.1);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 10px;
      transform: translateX(100px);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }

    .success-msg.show {
      transform: translateX(0);
      opacity: 1;
      pointer-events: auto;
    }

    @media (max-width: 768px) {
      .success-msg {
        top: 20px;
        right: 20px;
        left: 20px;
        transform: translateY(-50px);
        justify-content: center;
      }
      .success-msg.show {
        transform: translateY(0);
      }
      .profile-main, .profile-sidebar {
        padding: 20px;
      }
      .profile-tabs {
        overflow-x: auto;
        white-space: nowrap;
        padding-bottom: 15px; /* Leave space for scrollbar if any */
      }
      .profile-tabs::-webkit-scrollbar {
        height: 4px;
      }
      .profile-tabs::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
      }
    }

    /* Tabs */
    .profile-tabs {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--site-border);
      padding-bottom: 10px;
    }

    .profile-tab-btn {
      background: none;
      border: none;
      color: var(--site-text-muted);
      font-weight: 600;
      padding: 10px 20px;
      cursor: pointer;
      transition: all 0.3s;
      border-radius: 12px;
    }

    .profile-tab-btn.active {
      background: rgba(212, 175, 55, 0.1);
      color: var(--color-accent);
    }

    /* Orders list */
    .orders-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-height: 380px; /* Altura máxima para scroll interno */
      overflow-y: auto;
      padding-right: 10px;
    }

    .orders-list::-webkit-scrollbar { width: 6px; }
    .orders-list::-webkit-scrollbar-track { background: transparent; }
    .orders-list::-webkit-scrollbar-thumb { background: var(--site-border); border-radius: 10px; }
    .orders-list::-webkit-scrollbar-thumb:hover { background: var(--color-accent); }

    .order-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--site-border);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .order-info h4 {
      margin-bottom: 4px;
      color: var(--site-text);
    }

    .order-info p {
      font-size: 0.85rem;
      color: var(--site-text-muted);
    }

    .order-status {
      padding: 6px 12px;
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .status-pending { background: rgba(255, 193, 7, 0.2); color: #FFC107; }
    .status-completed { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
    .status-cancelled { background: rgba(255, 77, 77, 0.2); color: #ff4d4d; }

    .no-orders {
      text-align: center;
      padding: 40px;
      color: var(--site-text-muted);
    }
  </style>
</head>

<body>
  <!-- Preloader -->
  <div id="site-preloader" class="site-preloader">
    <div class="preloader-content">
      <img src="images/logo.png" alt="Logo" class="preloader-logo">
      <div class="preloader-spinner"></div>
    </div>
  </div>

  <!-- Contenido -->
  <div class="container profile-page">
    <div class="profile-grid">
      <!-- Sidebar -->
      <aside class="profile-sidebar">
        <div class="profile-avatar" id="user-avatar-circle">?</div>
        <h2 class="profile-name" id="user-display-name">Usuario</h2>
        <p class="profile-email" id="user-display-email">email@ejemplo.com</p>
        
        <nav class="profile-menu">
          <a href="index.html" class="profile-menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Volver al Inicio
          </a>
          <a href="#" class="profile-menu-item danger" id="btn-logout">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Cerrar Sesión
          </a>
        </nav>
      </aside>

      <!-- Main Content -->
      <main class="profile-main">
        <div class="profile-tabs">
          <button class="profile-tab-btn active" onclick="showSection('datos', this)">Mis Datos</button>
          <button class="profile-tab-btn" onclick="showSection('pedidos', this)">Historial de Pedidos</button>
        </div>

        <div class="profile-viewport" style="width: 100%; overflow: hidden; position: relative; transition: height 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); will-change: height;">
          <div class="profile-track" style="display: flex; width: 200%; align-items: flex-start; transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); will-change: transform;">
            
            <div id="section-datos" class="profile-section profile-slide" style="width: 50%; flex: 0 0 50%; transition: opacity 0.4s ease;">
              <h1 class="profile-section-title">Mis Datos</h1>
              
              <form class="profile-form" id="form-profile">
                <div class="form-grid">
                  <div class="form-field">
                    <label>Nombre Completo</label>
                    <input type="text" id="prof-name" placeholder="Tu nombre">
                  </div>
                  <div class="form-field">
                    <label>Teléfono / WhatsApp</label>
                    <input type="text" id="prof-phone" placeholder="5959...">
                  </div>
                  <div class="form-field full-width">
                    <label>Dirección de Entrega</label>
                    <input type="text" id="prof-address" placeholder="Calle, Ciudad, Referencias">
                  </div>
                </div>
                
                <div class="profile-actions">
                  <button type="submit" class="btn btn-primary" id="btn-save-profile">Guardar Cambios</button>
                </div>
                <div id="save-success" class="success-msg">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: #00ff88;"><polyline points="20 6 9 17 4 12"></polyline></svg>
                  <span>¡Perfil actualizado correctamente!</span>
                </div>
              </form>
            </div>

            <div id="section-pedidos" class="profile-section profile-slide" style="width: 50%; flex: 0 0 50%; opacity: 0; pointer-events: none; transition: opacity 0.4s ease;">
              <h1 class="profile-section-title">Mis Pedidos</h1>
              <div id="orders-list" class="orders-list">
                <div class="loading-orders">Cargando pedidos...</div>
              </div>
            </div>
          
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  
  <script>
    let _viewportTimer;
    function showSection(section, btnEvent) {
      const activeBtn = btnEvent || document.querySelector('.profile-tab-btn[onclick*="' + section + '"]');
      if (activeBtn && activeBtn.classList.contains('active')) return;

      document.querySelectorAll('.profile-tab-btn').forEach(b => b.classList.remove('active'));
      if (activeBtn) activeBtn.classList.add('active');

      const sDatos = document.getElementById('section-datos');
      const sPedidos = document.getElementById('section-pedidos');
      const track = document.querySelector('.profile-track');
      const viewport = document.querySelector('.profile-viewport');

      if (!track || !viewport || !sDatos || !sPedidos) return;

      // Restaurar alturas para poder medir correctamente
      sDatos.style.height = 'auto';
      sPedidos.style.height = 'auto';

      // Determinar si es desktop
      const isDesktop = window.innerWidth > 991;
      const baseHeight = sDatos.offsetHeight; // Usamos Mis Datos como ancla en desktop

      // Fijar la altura actual del viewport antes de cambiar para animar desde ahí
      viewport.style.height = viewport.offsetHeight + 'px';
      
      // Forzar reflow
      void viewport.offsetWidth;

      if (section === 'datos') {
        track.style.transform = 'translateX(0)';
        
        sDatos.style.opacity = '1';
        sDatos.style.pointerEvents = 'auto';
        sPedidos.style.opacity = '0';
        sPedidos.style.pointerEvents = 'none';

        // Animar altura
        viewport.style.height = isDesktop ? baseHeight + 'px' : sDatos.offsetHeight + 'px';
      } else {
        track.style.transform = 'translateX(-50%)';
        
        sPedidos.style.opacity = '1';
        sPedidos.style.pointerEvents = 'auto';
        sDatos.style.opacity = '0';
        sDatos.style.pointerEvents = 'none';

        // Animar altura
        viewport.style.height = isDesktop ? baseHeight + 'px' : sPedidos.offsetHeight + 'px';
      }

      // Restablecer altura auto y colapsar la sección inactiva después de la transición
      clearTimeout(_viewportTimer);
      _viewportTimer = setTimeout(() => {
        if (section === 'datos') {
          sPedidos.style.height = '0px';
          sPedidos.style.overflow = 'hidden';
        } else {
          sDatos.style.height = '0px';
          sDatos.style.overflow = 'hidden';
        }
        
        if (isDesktop) {
          viewport.style.height = baseHeight + 'px'; // Mantener altura fija en desktop
        } else {
          viewport.style.height = 'auto'; // Altura dinámica en móvil
        }
      }, 500);
    }

    // Inicializar altura del viewport
    document.addEventListener('DOMContentLoaded', () => {
      const viewport = document.querySelector('.profile-viewport');
      const sDatos = document.getElementById('section-datos');
      const sPedidos = document.getElementById('section-pedidos');
      if (viewport && sDatos && sPedidos) {
        setTimeout(() => {
          sPedidos.style.height = '0px';
          sPedidos.style.overflow = 'hidden';
          const isDesktop = window.innerWidth > 991;
          viewport.style.height = sDatos.offsetHeight + 'px';
          if (!isDesktop) {
            setTimeout(() => viewport.style.height = 'auto', 500);
          }
        }, 100);
      }
      
      // Ajustar si se cambia el tamaño de la ventana
      window.addEventListener('resize', () => {
        if (window.innerWidth > 991 && viewport && sDatos) {
           viewport.style.height = sDatos.offsetHeight + 'px';
        } else if (viewport) {
           viewport.style.height = 'auto';
        }
      });
    });

    // Fallback Preloader
    setTimeout(() => {
      const preloader = document.getElementById('site-preloader');
      if (preloader) preloader.classList.add('hidden');
    }, 2000);
  </script>
</body>

</html>
