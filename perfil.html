<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Mi Perfil - Mi Restaurante</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .profile-page {
      padding-top: 120px;
      padding-bottom: 80px;
      min-height: 100vh;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 40px;
      align-items: stretch;
    }

    @media (max-width: 991px) {
      .profile-grid {
        grid-template-columns: 1fr;
      }
    }

    .profile-sidebar {
      background: var(--site-surface);
      border: 1px solid var(--site-border);
      border-radius: 24px;
      padding: 30px;
      text-align: center;
    }

    .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--color-accent), var(--color-primary));
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 700;
      color: white;
      text-transform: uppercase;
    }

    .profile-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      margin-bottom: 8px;
    }

    .profile-email {
      color: var(--site-text-muted);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    .profile-menu {
      border-top: 1px solid var(--site-border);
      padding-top: 20px;
      text-align: left;
    }

    .profile-menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      color: var(--site-text);
      text-decoration: none;
      border-radius: 12px;
      transition: all 0.3s;
      font-weight: 500;
    }

    .profile-menu-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .profile-menu-item.danger {
      color: #ff4d4d;
      margin-top: 20px;
    }

    .profile-main {
      background: var(--site-surface);
      border: 1px solid var(--site-border);
      border-radius: 24px;
      padding: 40px;
      display: flex;
      flex-direction: column;
      min-height: 500px; /* Evita que la tarjeta cambie de tamaño al cambiar pestañas */
    }

    .profile-section {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .profile-section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .profile-form .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 767px) {
      .profile-form .form-grid {
        grid-template-columns: 1fr;
      }
    }

    .form-field {
      margin-bottom: 20px;
    }

    .form-field label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.85rem;
      color: var(--site-text-muted);
    }

    .form-field input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--site-border);
      border-radius: 12px;
      color: var(--site-text);
      font-family: 'Inter', sans-serif;
    }

    .form-field input:focus {
      outline: none;
      border-color: var(--color-accent);
    }

    .profile-actions {
      margin-top: 30px;
      display: flex;
      justify-content: flex-end;
    }

    .success-msg {
      color: #00ff88;
      font-size: 0.9rem;
      margin-top: 10px;
      display: none;
    }

    /* Tabs */
    .profile-tabs {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--site-border);
      padding-bottom: 10px;
    }

    .profile-tab-btn {
      background: none;
      border: none;
      color: var(--site-text-muted);
      font-weight: 600;
      padding: 10px 20px;
      cursor: pointer;
      transition: all 0.3s;
      border-radius: 12px;
    }

    .profile-tab-btn.active {
      background: rgba(212, 175, 55, 0.1);
      color: var(--color-accent);
    }

    /* Orders list */
    .orders-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-height: 380px; /* Altura máxima para scroll interno */
      overflow-y: auto;
      padding-right: 10px;
    }

    .orders-list::-webkit-scrollbar { width: 6px; }
    .orders-list::-webkit-scrollbar-track { background: transparent; }
    .orders-list::-webkit-scrollbar-thumb { background: var(--site-border); border-radius: 10px; }
    .orders-list::-webkit-scrollbar-thumb:hover { background: var(--color-accent); }

    .order-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--site-border);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .order-info h4 {
      margin-bottom: 4px;
      color: var(--site-text);
    }

    .order-info p {
      font-size: 0.85rem;
      color: var(--site-text-muted);
    }

    .order-status {
      padding: 6px 12px;
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .status-pending { background: rgba(255, 193, 7, 0.2); color: #FFC107; }
    .status-completed { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
    .status-cancelled { background: rgba(255, 77, 77, 0.2); color: #ff4d4d; }

    .no-orders {
      text-align: center;
      padding: 40px;
      color: var(--site-text-muted);
    }
  </style>
</head>

<body>
  <!-- Preloader -->
  <div id="site-preloader" class="site-preloader">
    <div class="preloader-content">
      <img src="images/logo.png" alt="Logo" class="preloader-logo">
      <div class="preloader-spinner"></div>
    </div>
  </div>

  <!-- Contenido -->
  <div class="container profile-page">
    <div class="profile-grid">
      <!-- Sidebar -->
      <aside class="profile-sidebar">
        <div class="profile-avatar" id="user-avatar-circle">?</div>
        <h2 class="profile-name" id="user-display-name">Usuario</h2>
        <p class="profile-email" id="user-display-email">email@ejemplo.com</p>
        
        <nav class="profile-menu">
          <a href="index.html" class="profile-menu-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Volver al Inicio
          </a>
          <a href="#" class="profile-menu-item danger" id="btn-logout">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Cerrar Sesión
          </a>
        </nav>
      </aside>

      <!-- Main Content -->
      <main class="profile-main">
        <div class="profile-tabs">
          <button class="profile-tab-btn active" onclick="showSection('datos')">Mis Datos</button>
          <button class="profile-tab-btn" onclick="showSection('pedidos')">Historial de Pedidos</button>
        </div>

        <div id="section-datos" class="profile-section">
          <h1 class="profile-section-title">Mis Datos</h1>
          
          <form class="profile-form" id="form-profile">
            <div class="form-grid">
              <div class="form-field">
                <label>Nombre Completo</label>
                <input type="text" id="prof-name" placeholder="Tu nombre">
              </div>
              <div class="form-field">
                <label>Teléfono / WhatsApp</label>
                <input type="text" id="prof-phone" placeholder="5959...">
              </div>
              <div class="form-field" style="grid-column: span 2;">
                <label>Dirección de Entrega</label>
                <input type="text" id="prof-address" placeholder="Calle, Ciudad, Referencias">
              </div>
            </div>
            
            <div class="profile-actions">
              <button type="submit" class="btn btn-primary" id="btn-save-profile">Guardar Cambios</button>
            </div>
            <p id="save-success" class="success-msg">¡Perfil actualizado correctamente!</p>
          </form>
        </div>

        <div id="section-pedidos" class="profile-section" style="display: none;">
          <h1 class="profile-section-title">Mis Pedidos</h1>
          <div id="orders-list" class="orders-list">
            <div class="loading-orders">Cargando pedidos...</div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  
  <script>
    function showSection(section) {
      document.querySelectorAll('.profile-section').forEach(s => s.style.display = 'none');
      document.querySelectorAll('.profile-tab-btn').forEach(b => b.classList.remove('active'));
      
      document.getElementById('section-' + section).style.display = 'flex';
      event.currentTarget.classList.add('active');
    }

    // Fallback Preloader
    setTimeout(() => {
      const preloader = document.getElementById('site-preloader');
      if (preloader) preloader.classList.add('hidden');
    }, 2000);
  </script>
</body>

</html>
